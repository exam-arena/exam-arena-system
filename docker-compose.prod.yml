services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    environment:
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      REDIS_URL: ${REDIS_URL}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
      COOKIE_SECURE: ${COOKIE_SECURE:-true}
      COOKIE_DOMAIN: ${COOKIE_DOMAIN:-}
      DB_MAX_OPEN_CONNS: ${DB_MAX_OPEN_CONNS:-100}
      DB_MAX_IDLE_CONNS: ${DB_MAX_IDLE_CONNS:-40}
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET}
      CLOUDINARY_AVATAR_FOLDER: ${CLOUDINARY_AVATAR_FOLDER}
      GET_ME_DB_TIMEOUT_MS: ${GET_ME_DB_TIMEOUT_MS:-800}
      REGISTER_DB_TIMEOUT_MS: ${REGISTER_DB_TIMEOUT_MS:-1200}
      REGISTER_HASH_WAIT_TIMEOUT_MS: ${REGISTER_HASH_WAIT_TIMEOUT_MS:-3000}
      LOGIN_DB_TIMEOUT_MS: ${LOGIN_DB_TIMEOUT_MS:-800}
      LOGIN_PASSWORD_WAIT_TIMEOUT_MS: ${LOGIN_PASSWORD_WAIT_TIMEOUT_MS:-3000}
      AUTH_PASSWORD_WORK_MAX_CONCURRENCY: ${AUTH_PASSWORD_WORK_MAX_CONCURRENCY:-0}
      LOGIN_IDENTIFIER_FAILURE_THRESHOLD: ${LOGIN_IDENTIFIER_FAILURE_THRESHOLD:-5}
      LOGIN_IDENTIFIER_COOLDOWN_SECONDS: ${LOGIN_IDENTIFIER_COOLDOWN_SECONDS:-10}
      REGISTER_IDENTIFIER_FAILURE_THRESHOLD: ${REGISTER_IDENTIFIER_FAILURE_THRESHOLD:-3}
      REGISTER_IDENTIFIER_COOLDOWN_SECONDS: ${REGISTER_IDENTIFIER_COOLDOWN_SECONDS:-15}
      LOGIN_RATE_LIMIT_RPS: ${LOGIN_RATE_LIMIT_RPS:-3}
      LOGIN_RATE_LIMIT_BURST: ${LOGIN_RATE_LIMIT_BURST:-10}
      REGISTER_RATE_LIMIT_RPS: ${REGISTER_RATE_LIMIT_RPS:-2}
      REGISTER_RATE_LIMIT_BURST: ${REGISTER_RATE_LIMIT_BURST:-6}
      REGISTER_EMAIL_RATE_LIMIT_RPS: ${REGISTER_EMAIL_RATE_LIMIT_RPS:-1}
      REGISTER_EMAIL_RATE_LIMIT_BURST: ${REGISTER_EMAIL_RATE_LIMIT_BURST:-4}
      REGISTER_USERNAME_RATE_LIMIT_RPS: ${REGISTER_USERNAME_RATE_LIMIT_RPS:-1}
      REGISTER_USERNAME_RATE_LIMIT_BURST: ${REGISTER_USERNAME_RATE_LIMIT_BURST:-4}
      LOGIN_IDENTIFIER_RATE_LIMIT_RPS: ${LOGIN_IDENTIFIER_RATE_LIMIT_RPS:-1}
      LOGIN_IDENTIFIER_RATE_LIMIT_BURST: ${LOGIN_IDENTIFIER_RATE_LIMIT_BURST:-5}
      START_ATTEMPT_RATE_LIMIT_RPS: ${START_ATTEMPT_RATE_LIMIT_RPS:-1.5}
      START_ATTEMPT_RATE_LIMIT_BURST: ${START_ATTEMPT_RATE_LIMIT_BURST:-5}
      SUBMIT_ATTEMPT_RATE_LIMIT_RPS: ${SUBMIT_ATTEMPT_RATE_LIMIT_RPS:-1}
      SUBMIT_ATTEMPT_RATE_LIMIT_BURST: ${SUBMIT_ATTEMPT_RATE_LIMIT_BURST:-3}
      GET_ATTEMPT_RATE_LIMIT_RPS: ${GET_ATTEMPT_RATE_LIMIT_RPS:-4}
      GET_ATTEMPT_RATE_LIMIT_BURST: ${GET_ATTEMPT_RATE_LIMIT_BURST:-12}
      SAVE_ANSWERS_RATE_LIMIT_RPS: ${SAVE_ANSWERS_RATE_LIMIT_RPS:-8}
      SAVE_ANSWERS_RATE_LIMIT_BURST: ${SAVE_ANSWERS_RATE_LIMIT_BURST:-20}
      RESULT_ATTEMPT_RATE_LIMIT_RPS: ${RESULT_ATTEMPT_RATE_LIMIT_RPS:-3}
      RESULT_ATTEMPT_RATE_LIMIT_BURST: ${RESULT_ATTEMPT_RATE_LIMIT_BURST:-8}
      REVIEW_ATTEMPT_RATE_LIMIT_RPS: ${REVIEW_ATTEMPT_RATE_LIMIT_RPS:-2}
      REVIEW_ATTEMPT_RATE_LIMIT_BURST: ${REVIEW_ATTEMPT_RATE_LIMIT_BURST:-6}
      GET_ATTEMPT_HISTORY_RATE_LIMIT_RPS: ${GET_ATTEMPT_HISTORY_RATE_LIMIT_RPS:-6}
      GET_ATTEMPT_HISTORY_RATE_LIMIT_BURST: ${GET_ATTEMPT_HISTORY_RATE_LIMIT_BURST:-18}
      GET_EXAM_RATE_LIMIT_RPS: ${GET_EXAM_RATE_LIMIT_RPS:-10}
      GET_EXAM_RATE_LIMIT_BURST: ${GET_EXAM_RATE_LIMIT_BURST:-30}
      GET_EXAMS_RATE_LIMIT_RPS: ${GET_EXAMS_RATE_LIMIT_RPS:-20}
      GET_EXAMS_RATE_LIMIT_BURST: ${GET_EXAMS_RATE_LIMIT_BURST:-80}
      GET_LATEST_EXAMS_RATE_LIMIT_RPS: ${GET_LATEST_EXAMS_RATE_LIMIT_RPS:-20}
      GET_LATEST_EXAMS_RATE_LIMIT_BURST: ${GET_LATEST_EXAMS_RATE_LIMIT_BURST:-80}
      GET_ROOMS_RATE_LIMIT_RPS: ${GET_ROOMS_RATE_LIMIT_RPS:-20}
      GET_ROOMS_RATE_LIMIT_BURST: ${GET_ROOMS_RATE_LIMIT_BURST:-80}
      GET_HOT_ROOMS_RATE_LIMIT_RPS: ${GET_HOT_ROOMS_RATE_LIMIT_RPS:-20}
      GET_HOT_ROOMS_RATE_LIMIT_BURST: ${GET_HOT_ROOMS_RATE_LIMIT_BURST:-80}
      GET_ROOM_EXAMS_RATE_LIMIT_RPS: ${GET_ROOM_EXAMS_RATE_LIMIT_RPS:-20}
      GET_ROOM_EXAMS_RATE_LIMIT_BURST: ${GET_ROOM_EXAMS_RATE_LIMIT_BURST:-80}
      JOIN_ROOM_RATE_LIMIT_RPS: ${JOIN_ROOM_RATE_LIMIT_RPS:-3}
      JOIN_ROOM_RATE_LIMIT_BURST: ${JOIN_ROOM_RATE_LIMIT_BURST:-10}
      GET_PROFILE_RATE_LIMIT_RPS: ${GET_PROFILE_RATE_LIMIT_RPS:-10}
      GET_PROFILE_RATE_LIMIT_BURST: ${GET_PROFILE_RATE_LIMIT_BURST:-30}
      UPDATE_PROFILE_RATE_LIMIT_RPS: ${UPDATE_PROFILE_RATE_LIMIT_RPS:-3}
      UPDATE_PROFILE_RATE_LIMIT_BURST: ${UPDATE_PROFILE_RATE_LIMIT_BURST:-10}
      START_ATTEMPT_DB_TIMEOUT_MS: ${START_ATTEMPT_DB_TIMEOUT_MS:-800}
      SUBMIT_WORKER_TIMEOUT_MS: ${SUBMIT_WORKER_TIMEOUT_MS:-5000}
      ATTEMPT_ANSWER_FLUSH_INTERVAL_SECONDS: ${ATTEMPT_ANSWER_FLUSH_INTERVAL_SECONDS:-15}
      ATTEMPT_ANSWER_FLUSH_BATCH_SIZE: ${ATTEMPT_ANSWER_FLUSH_BATCH_SIZE:-100}
      ATTEMPT_AUTO_SUBMIT_SWEEP_INTERVAL_SECONDS: ${ATTEMPT_AUTO_SUBMIT_SWEEP_INTERVAL_SECONDS:-30}
      ATTEMPT_AUTO_SUBMIT_SWEEP_BATCH_SIZE: ${ATTEMPT_AUTO_SUBMIT_SWEEP_BATCH_SIZE:-100}
    ports:
      - "8080:8080"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    environment:
      API_INTERNAL_URL: http://backend:8080
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
