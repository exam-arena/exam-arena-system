services:
  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      - backend

  backend:
    build: ./backend
    ports:
      - "8081:8080"
    volumes:
      - ./backend:/app
    env_file:
      - .env

volumes:
  frontend_node_modules:
