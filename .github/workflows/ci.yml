name: CI

on:
  push:
    branches:
      - main
      - dev/v2
  pull_request:
    branches:
      - main
      - dev/v2

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      - name: Download dependencies
        run: go mod download

      - name: Test
        run: go test ./...

  frontend:
    name: Frontend
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npx tsc --noEmit --incremental false

      - name: Build
        env:
          NEXT_PUBLIC_API_URL: https://api.examarena.id.vn
        run: npm run build

  docker:
    name: Docker and Compose
    runs-on: ubuntu-latest
    needs:
      - backend
      - frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Render production compose config
        run: docker compose --env-file .env.production.example -f docker-compose.prod.yml -f docker-compose.ec2.yml config

      - name: Build production images
        run: docker compose --env-file .env.production.example -f docker-compose.prod.yml -f docker-compose.ec2.yml build backend frontend
